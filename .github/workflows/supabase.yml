name: Deploy Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'webserver-needcollab/**'

jobs:
  deploy-migrations:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations
        run: |
          cd webserver-needcollab
          supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: deploy-migrations
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Edge Functions
        run: |
          cd webserver-needcollab
          for dir in supabase/functions/*/; do
            func=$(basename "$dir")
            if [ "$func" != "_shared" ]; then
              echo "Deploying function: $func"
              supabase functions deploy "$func" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
            fi
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
