name: Deploy Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'webserver-needcollab/**'
      - '.github/workflows/supabase.yml'

env:
  SUPABASE_PROJECT_REF: iwojzczrbozwfqulfwsa
  SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml3b2p6Y3pyYm96d2ZxdWxmd3NhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NTc5MDEsImV4cCI6MjA4OTUzMzkwMX0.zt_Ds0rv52lqX6d7emmcWhz13q9k6T9_wSlbigsaTxg
  SUPABASE_PUBLISHABLE_KEY: sb_publishable_sdT7nJlVrJHdyt-ZpmOOKQ_fp48dIKE

jobs:
  deploy-migrations:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: |
          cd webserver-needcollab
          supabase link --project-ref $SUPABASE_PROJECT_REF
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run migrations
        run: |
          cd webserver-needcollab
          supabase db push --db-url "postgresql://postgres.$SUPABASE_PROJECT_REF:${{ secrets.SUPABASE_DB_PASSWORD }}@aws-0-eu-west-3.pooler.supabase.com:6543/postgres"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: deploy-migrations
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Edge Functions
        run: |
          cd webserver-needcollab
          for dir in supabase/functions/*/; do
            func=$(basename "$dir")
            if [ "$func" != "_shared" ]; then
              echo "Deploying function: $func"
              supabase functions deploy "$func" --project-ref $SUPABASE_PROJECT_REF
            fi
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
