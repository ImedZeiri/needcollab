name: Deploy Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'webserver-needcollab/supabase/functions/**'
      - 'webserver-needcollab/supabase/migrations/**'

jobs:
  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    if: |
      contains(join(github.event.commits.*.modified, ','), 'supabase/functions') ||
      contains(join(github.event.commits.*.added, ','), 'supabase/functions')

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Edge Functions
        run: |
          cd webserver-needcollab
          for dir in supabase/functions/*/; do
            func=$(basename "$dir")
            if [ "$func" != "_shared" ]; then
              echo "Deploying function: $func"
              supabase functions deploy "$func" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
            fi
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-migrations:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    if: |
      contains(join(github.event.commits.*.modified, ','), 'supabase/migrations') ||
      contains(join(github.event.commits.*.added, ','), 'supabase/migrations')

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations
        run: |
          cd webserver-needcollab
          supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
